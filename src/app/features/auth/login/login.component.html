<div class="login-wrap">
  <div class="login-card">

    <div class="login-brand">
      <div class="brand-mark" aria-hidden="true">I</div>
      <div class="brand-name">IMPREN<span>DIG</span></div>
    </div>

    <h1 class="login-heading">Accedi al portale</h1>
    <p class="login-sub">Inserisci le tue credenziali per continuare</p>

    @if (error()) {
      <div class="login-error" role="alert">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <div class="form-field">
          <label class="form-label" for="email">Email</label>
          <input
            id="email"
            class="form-input"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="nome@imprendig.it"
            [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched"
          />
        </div>

        <div class="form-field">
          <label class="form-label" for="password">Password</label>
          <input
            id="password"
            class="form-input"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
            [attr.aria-invalid]="form.controls.password.invalid && form.controls.password.touched"
          />
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading()">
        @if (loading()) {
          Accesso in corso…
        } @else {
          Accedi
        }
      </button>
    </form>
  </div>
</div>
